<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Member Directory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Team Member Directory</h1>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search Employee...">

            <select id="departmentFilter">
                <option value="All">All Departments</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
            </select>
        </div>

        <div class="count-box">
            Total Employees:
            <span id="count">0</span>
        </div>

        <div class="form-box">
            <h2>Add Employee</h2>

            <input type="text" id="name" placeholder="Employee Name">

            <input type="text" id="designation" placeholder="Designation">

            <select id="department">
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
            </select>

            <button onclick="addEmployee()">
                Add Employee
            </button>
        </div>

        <div id="employeeContainer"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
